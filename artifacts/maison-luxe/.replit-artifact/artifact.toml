kind = "web"
previewPath = "/"
title = "Maison Luxe"
version = "1.0.0"
id = "artifacts/maison-luxe"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24293

[services.development]
run = "pnpm --filter @workspace/maison-luxe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maison-luxe", "run", "build" ]
serve = "static"
publicDir = "artifacts/maison-luxe/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24293"
BASE_PATH = "/"
